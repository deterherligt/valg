# .github/workflows/sync.yml
name: SFTP Sync

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes on election night (adjust per phase)
  workflow_dispatch:          # manual trigger for testing

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out code repo
        uses: actions/checkout@v4

      - name: Check out data repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.DATA_REPO }}          # e.g. owner/valg-data
          path: valg-data
          token: ${{ secrets.DATA_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Configure git for data repo
        run: |
          cd valg-data
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run sync
        env:
          VALG_DATA_REPO: valg-data
        run: |
          python -m valg sync \
            --election-folder "${{ vars.ELECTION_FOLDER }}"

      - name: Push data repo
        run: |
          cd valg-data
          git push
