name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: valg-macos
          - os: windows-latest
            artifact: valg-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[standalone]" pyinstaller

      - name: Build executable (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller valg.spec --distpath dist/

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller valg.spec --distpath dist/

      - name: Rename artifact (macOS)
        if: runner.os == 'macOS'
        run: mv dist/valg dist/valg-macos

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: Move-Item dist\valg.exe dist\valg-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/valg-macos/valg-macos
            artifacts/valg-windows.exe/valg-windows.exe
          generate_release_notes: true
